<header class="box registos">
      <div class="linha-registo"><span>r0 =</span><span id="r0g"></span></div>
      <div class="linha-registo"><span>r1 =</span><span id="r1g"></span></div>
      <div class="linha-registo"><span>r2 =</span><span id="r2g"></span></div>
      <div class="linha-registo"><span>r3 =</span><span id="r3g"></span></div>
      <div class="linha-registo"><span>r4 =</span><span id="r4g"></span></div>
      <div class="linha-registo"><span>r5 =</span><span id="r5g"></span></div>
      <div class="linha-registo"><span>r6 =</span><span id="r6g"></span></div>
      <div class="linha-registo"><span>r7 =</span><span id="r7g"></span></div>
      <div class="linha-registo"><span>sp =</span><span id="spg"></span></div>
      <div class="linha-registo"><span>pc =</span><span id="pcg"></span></div>
      <div class="linha-registo"><span>E =</span><span id="eg"></span></div>
      <div class="linha-registo"><span>Z =</span><span id="zg"></span></div>
      <div class="linha-registo"><span>C =</span><span id="cg"></span></div>
      <div class="linha-registo"><span>N =</span><span id="ng"></span></div>
      <div class="linha-registo"><span>O =</span><span id="og"></span></div>
    </header>



<main class="box assembler">
      <label for="codigo" class="titulo">Assembler</label>
      <div class="editor-assembler">
        <pre id="linhasCodigo" class="linhas-codigo">1</pre>
<textarea id="codigo" spellcheck="false" wrap="off" readonly>
MOV R1, 0002h
MOV R2, 0010h
MOV R3, FFFFh
MOV R4, 0001h

SHR R1, 1
SHL R1, 1
SHRA R3, 1
SHLA R3, 1
ROR R4, 1
ROL R4, 1
RORC R2, 1
ROLC R2, 1
       </textarea>
      </div>
    </main>

    <aside class="lateral">
<section class="botoes">

<button type="button" id="btnPasso">Passo a passo</button>
<button type="button" id="btnReset">Reset</button>

</section>
    </aside>
