<main class="box assembler">
      <label for="codigo" class="titulo">Assembler</label>
      <div class="editor-assembler">
        <pre id="linhasCodigo" class="linhas-codigo">1</pre>
<textarea id="codigo" spellcheck="false" wrap="off" readonly>
; esta parte do tutorial e acerca dos shifts e das rotacoes
; cada algarismo hexadecimal corresponde a 4 bits em binario

MOV R1, 0002h    ; 0000 0000 0000 0010b
MOV R2, 0010h    ; 0000 0000 0001 0000b
MOV R3, FFFFh    ; 1111 1111 1111 1111b
MOV R4, 0001h    ; 0000 0000 0000 0001b

SHR R1, 1        ; direita: 0002h -> 0001h
SHL R1, 1        ; esquerda: 0001h -> 0002h
SHRA R3, 1       ; direita aritmetica: mantem o bit de sinal
SHLA R3, 1       ; esquerda aritmetica: atualiza o overflow
ROR R4, 1        ; roda para a direita
ROL R4, 1        ; roda para a esquerda
RORC R2, 1       ; roda para a direita usando o carry
ROLC R2, 1       ; roda para a esquerda usando o carry
       </textarea>
      </div>
    </main>
