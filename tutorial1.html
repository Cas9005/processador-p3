<header class="box registos">
      <div class="linha-registo"><span>r0 =</span><span id="r0g"></span></div>
      <div class="linha-registo"><span>r1 =</span><span id="r1g"></span></div>
      <div class="linha-registo"><span>r2 =</span><span id="r2g"></span></div>

      <div class="linha-registo"><span>O =</span><span id="og"></span></div>
    </header>



<main class="box assembler">
      <label for="codigo" class="titulo">Assembler</label>
      <div class="editor-assembler">
        <pre id="linhasCodigo" class="linhas-codigo">1</pre>
<textarea id="codigo" spellcheck="false" wrap="off" readonly>
; esta parte é uma pequena introdução das flags  

ORIG 0000h

Inicio:
 
  MOV R1, 0005h
  CMP R1, 0005h

  MOV R2, 0001h
  SUB R2, 0001h

  MOV R3, 0000h
  DEC R3

  MOV R4, 7FFFh
  ADD R4, 0001h
  
  STC 
  CLC
  CMC

Fim:
  NOP
      
       </textarea>
      </div>
    </main>

    <aside class="lateral">
<section class="botoes">

<button type="button" id="btnPasso">Passo a passo</button>
